<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Proxy — Журнал</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2d2d49",
            accent: "#872450",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <header class="border-b border-white/10 bg-primary">
    <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-4 px-4 py-4">
      <div>
        <h1 class="text-lg font-semibold text-white">Журнал прокси</h1>
        <p class="text-xs text-slate-400">Elasticsearch при доступности · иначе PostgreSQL</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="data-source" class="text-xs text-slate-400"></span>
        <a href="/logout" class="rounded-lg border border-white/20 px-3 py-1.5 text-sm hover:bg-white/5">Выйти</a>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6">
    <section class="mb-6 rounded-xl border border-white/10 bg-primary/40 p-4 backdrop-blur">
      <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">С даты</label>
          <input type="datetime-local" id="filter-from" class="w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-sm text-white focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">По дату</label>
          <input type="datetime-local" id="filter-to" class="w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-sm text-white focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Метод</label>
          <select id="filter-method" class="w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-sm text-white focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent">
            <option value="">Любой</option>
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="PATCH">PATCH</option>
            <option value="CONNECT">CONNECT</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">URL / домен</label>
          <input type="search" id="filter-search" placeholder="Частичное совпадение…" class="w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-sm text-white placeholder-slate-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
      </div>
      <p id="filter-error" class="mt-3 hidden text-sm text-red-300"></p>
    </section>

    <div id="empty-state" class="hidden rounded-xl border border-dashed border-white/20 bg-primary/20 p-12 text-center text-slate-400">
      Нет записей по выбранным фильтрам.
    </div>

    <div class="overflow-hidden rounded-xl border border-white/10">
      <div class="overflow-x-auto">
        <table class="min-w-full text-left text-sm">
          <thead class="bg-primary/80 text-xs uppercase tracking-wide text-slate-400">
            <tr>
              <th class="px-4 py-3">Время</th>
              <th class="px-4 py-3">Метод</th>
              <th class="px-4 py-3">URL</th>
              <th class="px-4 py-3">Код</th>
              <th class="px-4 py-3">Клиент</th>
              <th class="px-4 py-3">Длительность</th>
              <th class="px-4 py-3 w-24"></th>
            </tr>
          </thead>
          <tbody id="log-rows" class="divide-y divide-white/5 bg-black/20"></tbody>
        </table>
      </div>
    </div>

    <nav class="mt-4 flex flex-wrap items-center justify-between gap-3 text-sm">
      <span id="page-info" class="text-slate-400"></span>
      <div class="flex flex-wrap items-center gap-2">
        <button type="button" id="btn-first" class="rounded-lg border border-white/15 px-3 py-2 hover:bg-white/5 disabled:opacity-40" title="Первая страница">Первая</button>
        <button type="button" id="btn-prev" class="rounded-lg border border-white/15 px-4 py-2 hover:bg-white/5 disabled:opacity-40">Назад</button>
        <button type="button" id="btn-next" class="rounded-lg border border-white/15 px-4 py-2 hover:bg-white/5 disabled:opacity-40">Вперёд</button>
        <button type="button" id="btn-last" class="rounded-lg border border-white/15 px-3 py-2 hover:bg-white/5 disabled:opacity-40" title="Последняя страница">Последняя</button>
      </div>
    </nav>
  </main>

  <!-- Модальное окно: видимость переключается в JS -->
  <div id="modal-backdrop" class="fixed inset-0 z-40 bg-black/70 backdrop-blur-sm" style="display: none" aria-hidden="true"></div>
  <div id="modal" role="dialog" aria-modal="true" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display: none">
    <div class="max-h-[90vh] w-full max-w-3xl overflow-hidden rounded-xl border border-white/10 bg-slate-900 shadow-2xl flex flex-col">
      <div class="flex items-center justify-between border-b border-white/10 bg-primary px-4 py-3">
        <h2 class="text-lg font-semibold text-white">Детали записи</h2>
        <button type="button" id="modal-close" class="rounded-lg p-2 text-slate-400 hover:bg-white/10 hover:text-white" aria-label="Закрыть">&times;</button>
      </div>
      <div id="modal-body" class="overflow-y-auto p-4 text-sm text-slate-200 space-y-6"></div>
    </div>
  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
