<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Proxy — Вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2d2d49",
            accent: "#872450",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md rounded-xl border border-white/10 bg-primary/90 p-8 shadow-2xl backdrop-blur">
    <h1 class="text-2xl font-semibold tracking-tight text-white mb-1">Deep Proxy</h1>
    <p class="text-sm text-slate-400 mb-8">Войдите, чтобы просматривать журнал прокси</p>
    {% if error %}
    <div class="mb-4 rounded-lg bg-accent/20 border border-accent/40 px-3 py-2 text-sm text-red-200">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label for="username" class="block text-xs font-medium uppercase tracking-wide text-slate-400 mb-1">Имя пользователя</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          class="w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-white placeholder-slate-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent"
        />
      </div>
      <div>
        <label for="password" class="block text-xs font-medium uppercase tracking-wide text-slate-400 mb-1">Пароль</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          class="w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-white placeholder-slate-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent"
        />
      </div>
      <button
        type="submit"
        class="w-full rounded-lg bg-accent py-2.5 text-sm font-semibold text-white shadow hover:opacity-95 active:scale-[0.99] transition"
      >
        Войти
      </button>
    </form>
  </div>
</body>
</html>
